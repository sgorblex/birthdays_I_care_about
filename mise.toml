[tools]
python = "3.14.5"
uv = "0.11.16"

[env]
_.python.venv = { path = ".venv", create = true }
UV_PYTHON = { value = "{{ tools.python.path }}", tools = true }

[tasks.setup]
description = "Install Python dependencies"
run = "uv sync --all-groups"

[tasks.check]
description = "Ruff + mypy"
run = ["uv run ruff check .", "uv run ruff format --check .", "uv run mypy ."]

[tasks.fix]
description = "Ruff auto-fix + format, then mypy (types are not auto-fixed)"
run = ["uv run ruff check . --fix", "uv run ruff format .", "uv run mypy ."]

[tasks.clean]
description = "Remove .venv, caches, and local package metadata"
run = [
  "rm -rf .venv .mypy_cache .ruff_cache .pytest_cache",
  "rm -rf ./*.egg-info 2>/dev/null || true",
]
